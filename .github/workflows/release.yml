name: Release\n\non:\n  push:\n    tags:\n      - 'v*'\n\njobs:\n  release:\n    runs-on: ubuntu-latest\n    \n    steps:\n    - uses: actions/checkout@v4\n    \n    - name: Setup Node.js\n      uses: actions/setup-node@v4\n      with:\n        node-version: '20.x'\n        cache: 'npm'\n    \n    - name: Install dependencies\n      run: npm install --ignore-scripts --force\n    \n    - name: Generate Prisma client\n      run: npx prisma generate\n    \n    - name: Run tests\n      run: npm test\n    \n    - name: Build project\n      run: npm run build\n    \n    - name: Create Release\n      uses: actions/create-release@v1\n      env:\n        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n      with:\n        tag_name: ${{ github.ref }}\n        release_name: Release ${{ github.ref }}\n        body: |\n          ## Changes in ${{ github.ref }}\n          \n          Please see the [CHANGELOG](https://github.com/yourusername/ChainLoyalty-MCP/blob/main/CHANGELOG.md) for details.\n        draft: false\n        prerelease: false\n    \n    - name: Deploy to MCP-Use\n      run: |\n        echo \"Deploying to MCP-Use...\"\n        npm run deploy\n      env:\n        MCP_DEPLOY_TOKEN: ${{ secrets.MCP_DEPLOY_TOKEN }}
