version: 2\nupdates:\n  # Enable version updates for npm\n  - package-ecosystem: \"npm\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n      time: \"09:00\"\n    open-pull-requests-limit: 10\n    reviewers:\n      - \"chainloyalty-team\"\n    assignees:\n      - \"chainloyalty-team\"\n    commit-message:\n      prefix: \"chore\"\n      include: \"scope\"\n    labels:\n      - \"dependencies\"\n      - \"npm\"\n    \n  # Enable version updates for GitHub Actions\n  - package-ecosystem: \"github-actions\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n      time: \"09:00\"\n    open-pull-requests-limit: 5\n    reviewers:\n      - \"chainloyalty-team\"\n    assignees:\n      - \"chainloyalty-team\"\n    commit-message:\n      prefix: \"chore\"\n      include: \"scope\"\n    labels:\n      - \"dependencies\"\n      - \"github-actions\"\n    \n  # Enable Docker updates (if Dockerfile exists)\n  - package-ecosystem: \"docker\"\n    directory: \"/\"\n    schedule:\n      interval: \"weekly\"\n      day: \"monday\"\n      time: \"09:00\"\n    open-pull-requests-limit: 5\n    reviewers:\n      - \"chainloyalty-team\"\n    assignees:\n      - \"chainloyalty-team\"\n    commit-message:\n      prefix: \"chore\"\n      include: \"scope\"\n    labels:\n      - \"dependencies\"\n      - \"docker\"
